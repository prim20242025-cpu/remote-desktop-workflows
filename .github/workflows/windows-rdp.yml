name: WINDOWS RDP - CLOUDFLARE
on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
      - name: Setup Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Enable and Configure Windows RDP
        shell: pwsh
        run: |
          # فعال‌سازی RDP در رجیستری
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          # باز کردن فایروال
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # رفع مشکل NLA با غیرفعال کردن احراز هویت اجباری (اختیاری)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          # تنظیم SecurityLayer روی RDP (سازگاری بهتر)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0
          # اطمینان از روشن بودن سرویس
          Start-Service TermService -Verbose
          Write-Host "✅ RDP configured properly"

      - name: Set Administrator Password
        run: |
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd123!" -Force)
          Write-Host "✅ Password Configured!"

      - name: Start Cloudflare Tunnel and Show URL
        shell: pwsh
        run: |
          Write-Host "🚀 Starting Cloudflare Tunnel..."
          $tunnelLog = "tunnel_output.txt"
          $process = Start-Process cloudflared -ArgumentList "tunnel --url tcp://localhost:3389" -PassThru -RedirectStandardOutput $tunnelLog -NoNewWindow

          $rdpHost = $null
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout -and -not $rdpHost) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            if (Test-Path $tunnelLog) {
              Get-Content $tunnelLog | ForEach-Object {
                if ($_ -match 'https://([a-zA-Z0-9-]+\.trycloudflare\.com)') {
                  $rdpHost = $Matches[1]
                }
              }
            }
          }

          if ($rdpHost) {
            Write-Host "============================================"
            Write-Host "🌍 RDP TUNNEL URL: https://$rdpHost"
            Write-Host "--------------------------------------------"
            Write-Host "   USE THIS IN REMOTE DESKTOP:"
            Write-Host "   $rdpHost"
            Write-Host "============================================"
          } else {
            Write-Host "⚠️  Could not extract URL automatically."
            if (Test-Path $tunnelLog) {
              Write-Host "Tunnel log content for manual check:"
              Get-Content $tunnelLog | Write-Host
            }
          }

          Write-Host "📋 CONNECTION DETAILS:"
          Write-Host "   USERNAME: runneradmin"
          Write-Host "   PASSWORD: P@ssw0rd123!"
          Write-Host "   OS: Windows Server 2025"
          Write-Host "   CPU: 4 cores"
          Write-Host "   RAM: 16GB"

      - name: Keep Session Alive
        run: |
          Write-Host "⏳ Session Active - Keeping alive..."
          while ($true) {
            Start-Sleep -Seconds 60
            Write-Host "✓ Active - $(Get-Date -Format 'HH:mm:ss')"
          }
