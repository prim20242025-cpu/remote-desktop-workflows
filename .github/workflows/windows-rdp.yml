name: WINDOWS RDP - CLOUDFLARE
on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
      - name: Setup Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Force RDP to Listen
        shell: pwsh
        run: |
          # فعال‌سازی و تنظیمات امنیتی
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Restart-Service TermService -Force
          Start-Sleep -Seconds 10

          # تست گوش دادن پورت
          $tcp = netstat -an | Select-String ':3389' | Select-String 'LISTENING'
          if (-not $tcp) {
            Write-Host "⚠️ RDP still not listening, enabling via CIM..."
            Invoke-CimMethod -ClassName Win32_TerminalServiceSetting -Namespace root/cimv2/terminalservices -MethodName SetAllowTSConnections -Arguments @{ AllowTSConnections = 1; fDenyTSConnections = $false }
            Restart-Service TermService -Force
            Start-Sleep -Seconds 10
          }
          $tcp = netstat -an | Select-String ':3389' | Select-String 'LISTENING'
          if ($tcp) {
            Write-Host "✅ RDP is LISTENING on 3389"
          } else {
            Write-Host "❌ CRITICAL: RDP still not listening!"
          }

      - name: Set Administrator Password
        run: |
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd123!" -Force)
          Write-Host "✅ Password Configured"

      - name: Start Cloudflare Tunnel and Extract URL
        shell: pwsh
        run: |
          Write-Host "🚀 Starting Cloudflare Tunnel..."
          $tunnelLog = "tunnel_stderr.txt"
          $proc = Start-Process cloudflared -ArgumentList "tunnel --url tcp://localhost:3389" -PassThru -NoNewWindow -RedirectStandardError $tunnelLog

          $rdpHost = $null
          $timeout = 40
          $elapsed = 0
          while ($elapsed -lt $timeout -and -not $rdpHost) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            if (Test-Path $tunnelLog) {
              Get-Content $tunnelLog | ForEach-Object {
                if ($_ -match 'https://([a-zA-Z0-9-]+\.trycloudflare\.com)') {
                  $rdpHost = $matches[1]
                }
              }
            }
          }

          if ($rdpHost) {
            Write-Host "🌍 RDP TUNNEL: https://$rdpHost"
            Write-Host "👉 $rdpHost"
          } else {
            Write-Host "⚠️ Manual check:"
            Get-Content $tunnelLog -ErrorAction SilentlyContinue | Write-Host
          }

          Write-Host "USER: runneradmin | PASS: P@ssw0rd123! | OS: Windows Server 2025"

      - name: Keep Alive
        run: |
          while ($true) {
            Start-Sleep -Seconds 60
            Write-Host "✓ $(Get-Date -Format 'HH:mm:ss')"
          }
