name: WINDOWS RDP - CLOUDFLARE
on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
      - name: Setup Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Force-Enable RDP and Verify Listen
        shell: pwsh
        run: |
          # ۱. فعال‌سازی RDP از چند مسیر
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # ۲. ریستارت کامل سرویس ترمینال
          Restart-Service TermService -Force -Verbose
          Start-Sleep -Seconds 10

          # ۳. چک می‌کنیم پورت ۳۳۸۹ واقعا گوش می‌ده یا نه
          $portCheck = netstat -an | Select-String ":3389" | Select-String "LISTENING"
          if (-not $portCheck) {
            Write-Host "⚠️ Port 3389 NOT LISTENING - manual intervention needed"
          } else {
            Write-Host "✅ Port 3389 is LISTENING"
          }
          Write-Host "✅ RDP Ready"

      - name: Set Administrator Password
        run: |
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd123!" -Force)
          Write-Host "✅ Password Configured"

      - name: Start Cloudflare Tunnel and Extract URL
        shell: pwsh
        run: |
          Write-Host "🚀 Starting Cloudflare Tunnel..."
          $tunnelLog = "tunnel_stderr.txt"
          # این بار stderr را می‌گیریم چون URL را آنجا می‌نویسد
          $proc = Start-Process cloudflared -ArgumentList "tunnel --url tcp://localhost:3389" -PassThru -NoNewWindow -RedirectStandardError $tunnelLog

          # منتظر بمانیم تا URL پیدا شود
          $rdpHost = $null
          $timeout = 40
          $elapsed = 0
          while ($elapsed -lt $timeout -and -not $rdpHost) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            if (Test-Path $tunnelLog) {
              Get-Content $tunnelLog | ForEach-Object {
                if ($_ -match 'https://([a-zA-Z0-9-]+\.trycloudflare\.com)') {
                  $rdpHost = $matches[1]
                }
              }
            }
          }

          if ($rdpHost) {
            Write-Host "============================================"
            Write-Host "🌍 RDP TUNNEL URL: https://$rdpHost"
            Write-Host "--------------------------------------------"
            Write-Host "   USE THIS IN REMOTE DESKTOP:"
            Write-Host "   $rdpHost"
            Write-Host "============================================"
          } else {
            Write-Host "⚠️ Could not extract URL automatically."
            Write-Host "   Manual check from below:"
            if (Test-Path $tunnelLog) {
              Get-Content $tunnelLog | Write-Host
            }
          }

          Write-Host "📋 CONNECTION DETAILS:"
          Write-Host "   USERNAME: runneradmin"
          Write-Host "   PASSWORD: P@ssw0rd123!"
          Write-Host "   OS: Windows Server 2025 Datacenter"
          Write-Host "   CPU: 4 cores | RAM: 16GB"

      - name: Keep Alive
        run: |
          Write-Host "⏳ Session Active - Keeping alive..."
          while ($true) {
            Start-Sleep -Seconds 60
            Write-Host "✓ Active - $(Get-Date -Format 'HH:mm:ss')"
          }
