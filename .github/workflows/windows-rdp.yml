name: WINDOWS RDP - CLOUDFLARE
on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
      - name: Setup Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Enable Windows RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          Write-Host "✅ RDP Enabled Successfully!"

      - name: Set Administrator Password
        run: |
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd123!" -Force)
          Write-Host "✅ Password Configured!"

      - name: Start Cloudflare Tunnel and Show URL
        shell: pwsh
        run: |
          Write-Host "🚀 Starting Cloudflare Tunnel..."
          $tunnelLog = "tunnel_output.txt"
          $process = Start-Process cloudflared -ArgumentList "tunnel --url tcp://localhost:3389" -PassThru -RedirectStandardOutput $tunnelLog -NoNewWindow
          
          # Wait until the tunnel URL appears in the file (max 30 seconds)
          $timeout = 30
          $elapsed = 0
          while ($elapsed -lt $timeout) {
            Start-Sleep -Seconds 2
            $elapsed += 2
            if (Test-Path $tunnelLog) {
              $content = Get-Content $tunnelLog -Raw -ErrorAction SilentlyContinue
              if ($content -match 'https://[a-zA-Z0-9-]+\.trycloudflare\.com') {
                break
              }
            }
          }

          if (Test-Path $tunnelLog) {
            $output = Get-Content $tunnelLog -Raw
            Write-Host "Tunnel output:"
            Write-Host $output

            if ($output -match 'https://[a-zA-Z0-9-]+\.trycloudflare\.com') {
              $rdpUrl = $Matches[0]
              Write-Host "============================================"
              Write-Host "🌍 RDP TUNNEL URL: $rdpUrl"
              Write-Host "--------------------------------------------"
              Write-Host "   USE THIS IN REMOTE DESKTOP:"
              Write-Host "   $($rdpUrl -replace 'https://', '')"
              Write-Host "============================================"
            } else {
              Write-Host "⚠️  URL not found in tunnel output."
            }
          } else {
            Write-Host "⚠️  Tunnel log file not found."
          }

          Write-Host "📋 CONNECTION DETAILS:"
          Write-Host "   USERNAME: runneradmin"
          Write-Host "   PASSWORD: P@ssw0rd123!"
          Write-Host "   OS: Windows Server 2025"
          Write-Host "   CPU: 4 cores"
          Write-Host "   RAM: 16GB"

      - name: Keep Session Alive
        run: |
          Write-Host "⏳ Session Active - Keeping alive..."
          while ($true) {
            Start-Sleep -Seconds 60
            Write-Host "✓ Active - $(Get-Date -Format 'HH:mm:ss')"
          }
